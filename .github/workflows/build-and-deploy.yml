name: Build & Deploy Signal Log

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }  # full history for git log timestamps
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - name: Build site
        run: python3 scripts/build.py
      - name: Stamp latest commit with OpenTimestamps
        run: |
          pip install opentimestamps-client
          # Hash the latest entry file + OTS-anchor it to Bitcoin
          latest=$(ls -t entries/*.md | head -1)
          ots stamp "$latest" || true
      - uses: actions/upload-pages-artifact@v3
        with: { path: public }

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
